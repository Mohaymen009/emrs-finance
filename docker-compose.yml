# Production deployment for the EMRS Finance Platform on a single VPS.
#
# One-time setup:
#   1. cp .env.example .env   and fill in real values (DOMAIN,
#      POSTGRES_PASSWORD, SEED_ADMIN_USERNAME/PASSWORD).
#   2. docker compose build
#   3. docker compose up -d postgres
#   4. docker compose --profile tools run --rm migrate      # creates tables + seeds divisions/admin
#   5. docker compose up -d
#
# Caddy automatically obtains and renews a Let's Encrypt TLS certificate for
# DOMAIN, as long as DNS for that domain already points at this server and
# ports 80/443 are reachable from the internet.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emrs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-emrs_finance}
    volumes:
      - emrs_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emrs}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not exposed to the host/internet — only reachable by other containers
    # on this compose network. Remove this restriction only for local debugging.
    expose:
      - "5432"

  # One-off helper: `docker compose --profile tools run --rm migrate` applies the schema and
  # seeds divisions + the initial admin user. Not part of the running stack.
  migrate:
    build:
      context: .
      target: builder
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-emrs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-emrs_finance}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-Noshaad}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Noshaad123}
    command: sh -c "npx drizzle-kit push --force && npx tsx src/db/seed.ts"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-emrs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-emrs_finance}
      NODE_ENV: production
    volumes:
      - emrs_file_storage:/app/secure-storage
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  emrs_pg_data:
  emrs_file_storage:
  caddy_data:
  caddy_config:
